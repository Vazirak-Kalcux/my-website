<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>치지직 &amp; 위플랩 커스텀 CSS 커스터마이저 v2</title>
<style>
  /* ===== 웹폰트 (페이지 UI용 · 로드 실패 시 자동 대체) ===== */
  @import url('https://cdn.jsdelivr.net/npm/galmuri@latest/dist/galmuri.css');
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css');
  @font-face {
    font-family: 'DungGeunMo';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
    font-weight: normal; font-style: normal; font-display: swap;
  }

  /* ===== 커스터마이저 페이지 자체 스타일 ===== */
  :root{
    --cy:#5ee7ff; --pk:#ff2d95;
    --bg:#0c0818; --panel:#150f26; --panel2:#1b1432;
    --line:rgba(94,231,255,.16); --txt:#e8ecf7; --sub:#9aa0b8;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:
      radial-gradient(900px 420px at 85% -10%, rgba(255,45,149,.10), transparent 60%),
      radial-gradient(800px 420px at -10% 110%, rgba(94,231,255,.08), transparent 60%),
      var(--bg);
    color:var(--txt);
    font-family:'Pretendard','Malgun Gothic','Apple SD Gothic Neo',sans-serif;
    font-size:14px;
  }

  /* ----- 상단 헤더 ----- */
  header{
    position:sticky; top:0; z-index:20;
    display:flex; align-items:center; gap:12px; flex-wrap:wrap;
    padding:12px 18px;
    background:rgba(12,8,24,.85); backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .logo-pill{
    display:inline-flex; align-items:center; gap:8px;
    border:1.5px solid var(--cy); border-radius:10px;
    padding:6px 12px;
    box-shadow:0 0 10px rgba(94,231,255,.35);
    font-family:'DungGeunMo','Galmuri11',ui-monospace,monospace;
    font-size:13px; letter-spacing:.5px; white-space:nowrap;
  }
  .logo-pill .dot{color:var(--pk); text-shadow:0 0 6px rgba(255,45,149,.8)}
  header h1{font-size:15px; margin:0; font-weight:700}
  header .sub{color:var(--sub); font-size:12px; margin-top:2px}
  .spacer{flex:1}

  /* 모드 탭 */
  .mode-tabs{display:flex; border:1.5px solid var(--line); border-radius:11px; overflow:hidden}
  .mode-tabs button{
    appearance:none; border:none; background:transparent; color:var(--sub);
    padding:10px 18px; font-size:13.5px; font-weight:700; cursor:pointer; transition:.15s;
  }
  .mode-tabs button.active[data-mode="chzzk"]{
    background:rgba(94,231,255,.16); color:var(--txt);
    box-shadow:inset 0 0 12px rgba(94,231,255,.2); text-shadow:0 0 8px rgba(94,231,255,.6);
  }
  .mode-tabs button.active[data-mode="weflab"]{
    background:rgba(255,45,149,.16); color:var(--txt);
    box-shadow:inset 0 0 12px rgba(255,45,149,.2); text-shadow:0 0 8px rgba(255,45,149,.6);
  }

  .btn{
    appearance:none; border:1px solid var(--line); background:var(--panel2);
    color:var(--txt); border-radius:9px; padding:9px 14px; font-size:13px;
    cursor:pointer; transition:.15s; white-space:nowrap;
  }
  .btn:hover{border-color:var(--cy); box-shadow:0 0 10px rgba(94,231,255,.25)}
  .btn.primary{
    border:1.5px solid var(--cy); font-weight:700;
    background:linear-gradient(135deg, rgba(94,231,255,.14), rgba(255,45,149,.14));
    box-shadow:0 0 12px rgba(94,231,255,.3);
  }
  .btn.primary:hover{box-shadow:0 0 18px rgba(94,231,255,.5)}
  .btn:focus-visible{outline:2px solid var(--cy); outline-offset:2px}

  /* ----- 본문 2단 레이아웃 ----- */
  main{
    display:grid; grid-template-columns:410px 1fr;
    height:calc(100vh - 63px);
  }

  /* ----- 왼쪽: 컨트롤 패널 ----- */
  #controls{
    overflow-y:auto; padding:14px 14px 40px;
    border-right:1px solid var(--line);
    background:linear-gradient(180deg, rgba(21,15,38,.6), rgba(12,8,24,.2));
  }
  details.sec{
    background:var(--panel); border:1px solid var(--line);
    border-radius:12px; margin-bottom:10px; overflow:hidden;
  }
  details.sec summary{
    cursor:pointer; list-style:none; user-select:none;
    padding:11px 14px; font-weight:700; font-size:13.5px;
    display:flex; align-items:center; gap:8px;
    border-bottom:1px solid transparent;
  }
  details.sec[open] summary{border-bottom-color:var(--line)}
  details.sec summary::-webkit-details-marker{display:none}
  details.sec summary::after{
    content:"▾"; margin-left:auto; color:var(--cy); transition:.15s;
  }
  details.sec:not([open]) summary::after{transform:rotate(-90deg)}
  .sec-body{padding:10px 14px 14px}

  .ctl{display:grid; grid-template-columns:1fr; gap:6px; padding:9px 0; border-bottom:1px dashed rgba(255,255,255,.06)}
  .ctl:last-child{border-bottom:none}
  .ctl .lbl{display:flex; align-items:center; justify-content:space-between; gap:8px}
  .ctl .lbl span.name{color:var(--txt); font-size:13px}
  .ctl .lbl span.hint{color:var(--sub); font-size:11px; text-align:right}
  .ctl .row{display:flex; align-items:center; gap:10px}
  input[type=range]{flex:1; accent-color:var(--cy); height:22px}
  .num{
    width:74px; background:#0e0a1e; color:var(--txt);
    border:1px solid var(--line); border-radius:7px;
    padding:5px 7px; font-size:12.5px; text-align:right;
  }
  .num:focus{outline:none; border-color:var(--cy)}
  .unit{color:var(--sub); font-size:11.5px; width:26px}
  input[type=color]{
    width:44px; height:30px; padding:0; border:1px solid var(--line);
    border-radius:7px; background:#0e0a1e; cursor:pointer; flex:none;
  }
  .hexlbl{font-family:ui-monospace,Consolas,monospace; font-size:12px; color:var(--sub)}
  select{
    flex:1; background:#0e0a1e; color:var(--txt); border:1px solid var(--line);
    border-radius:7px; padding:7px 8px; font-size:12.5px;
  }
  /* 토글 스위치 */
  .switch{position:relative; width:42px; height:22px; flex:none}
  .switch input{opacity:0; width:0; height:0}
  .slider-tg{
    position:absolute; inset:0; background:#241c40; border:1px solid var(--line);
    border-radius:22px; transition:.15s; cursor:pointer;
  }
  .slider-tg::before{
    content:""; position:absolute; width:15px; height:15px; left:3px; top:2.5px;
    background:#8a90ad; border-radius:50%; transition:.15s;
  }
  .switch input:checked + .slider-tg{background:rgba(94,231,255,.25); border-color:var(--cy)}
  .switch input:checked + .slider-tg::before{transform:translateX(19px); background:var(--cy); box-shadow:0 0 6px rgba(94,231,255,.8)}

  .css-view{width:100%; height:220px; background:#0a0716; color:#bfe9ff;
    border:1px solid var(--line); border-radius:9px; padding:10px;
    font-family:ui-monospace,Consolas,monospace; font-size:11px; line-height:1.5; resize:vertical}
  .mini-note{color:var(--sub); font-size:11.5px; line-height:1.6; margin-top:8px}
  .mini-note b{color:var(--txt)}

  /* ----- 오른쪽: 미리보기 ----- */
  #preview-pane{display:flex; flex-direction:column; min-width:0}
  .pv-toolbar{
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    padding:10px 14px; border-bottom:1px solid var(--line);
    background:rgba(21,15,38,.5);
  }
  .seg{display:flex; border:1px solid var(--line); border-radius:9px; overflow:hidden}
  .seg button{
    appearance:none; border:none; background:transparent; color:var(--sub);
    padding:8px 13px; font-size:12.5px; cursor:pointer; transition:.15s;
  }
  .seg button.active{background:rgba(94,231,255,.16); color:var(--txt); box-shadow:inset 0 0 8px rgba(94,231,255,.15)}
  .pv-label{color:var(--sub); font-size:12px}
  #pv-frame{flex:1; width:100%; border:none; display:block; background:transparent}
  .pv-foot{
    padding:7px 14px; color:var(--sub); font-size:11.5px;
    border-top:1px solid var(--line); background:rgba(12,8,24,.6);
  }

  /* 토스트 */
  #toast{
    position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px);
    background:rgba(10,7,22,.95); border:1.5px solid var(--cy); color:var(--txt);
    border-radius:10px; padding:11px 18px; font-size:13px; opacity:0;
    pointer-events:none; transition:.25s; z-index:50;
    box-shadow:0 0 16px rgba(94,231,255,.4); max-width:90vw; text-align:center;
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

  /* 반응형 */
  @media (max-width: 980px){
    main{grid-template-columns:1fr; height:auto}
    #preview-pane{order:-1; height:60vh; border-bottom:1px solid var(--line)}
    #controls{border-right:none; max-height:none}
    header h1{font-size:13px}
    header .sub{display:none}
    .logo-pill{font-size:11px}
  }
  @media (prefers-reduced-motion: reduce){
    *{transition:none !important}
  }
</style>
</head>
<body>

<header>
  <span class="logo-pill"><span class="dot">♥</span> OVERLAY LAB</span>
  <div>
    <h1>치지직 &amp; 위플랩 커스텀 CSS 커스터마이저</h1>
    <div class="sub">v2 · 값을 바꾸면 미리보기에 즉시 반영 · 모드별 CSS 복사/다운로드</div>
  </div>
  <div class="mode-tabs" id="mode-tabs">
    <button data-mode="chzzk" class="active">치지직 모드</button>
    <button data-mode="weflab">위플랩 모드</button>
  </div>
  <div class="spacer"></div>
  <button class="btn" id="btn-reset">↺ 기본값</button>
  <button class="btn" id="btn-download">⬇ .css 다운로드</button>
  <button class="btn primary" id="btn-copy">📋 CSS 복사</button>
</header>

<main>
  <!-- ========== 왼쪽: 조절 패널 ========== -->
  <aside id="controls">
    <div id="sections-chzzk"></div>
    <div id="sections-weflab" style="display:none"></div>

    <details class="sec">
      <summary>📄 생성된 CSS 미리보기</summary>
      <div class="sec-body">
        <textarea class="css-view" id="css-view" readonly spellcheck="false"></textarea>
        <div class="mini-note">복사 버튼이 동작하지 않는 환경에서는 이 칸을 클릭 → 전체 선택(Ctrl+A) → 복사(Ctrl+C) 하세요.</div>
      </div>
    </details>

    <div class="mini-note" id="apply-note"></div>
  </aside>

  <!-- ========== 오른쪽: 미리보기 ========== -->
  <section id="preview-pane">
    <div class="pv-toolbar">
      <span class="pv-label">배경 테스트</span>
      <div class="seg" id="bg-seg">
        <button data-bg="dark" class="active">어두움</button>
        <button data-bg="mid">중간</button>
        <button data-bg="light">밝음</button>
      </div>
      <span class="pv-label" style="margin-left:6px">채팅 시뮬레이션</span>
      <button class="btn" id="btn-auto">⏸ 자동 일시정지</button>
      <button class="btn" id="btn-add">＋ 채팅 추가</button>
    </div>
    <iframe id="pv-frame" title="채팅 오버레이 미리보기"></iframe>
    <div class="pv-foot" id="pv-foot"></div>
  </section>
</main>

<div id="toast">✓ 준비 완료</div>

<script>
/* =========================================================
   0) 모드 · 공용 상수
========================================================= */
let mode = 'chzzk';   /* 'chzzk' | 'weflab' */

const FONT_STACK = {
  g14:"'Galmuri14', 'DungGeunMo', sans-serif",

/* =========================================================
   1) 치지직 상태
========================================================= */
const DEF_C = {

    {k:'txtAlign',t:'select', label:'말풍선 내부 텍스트 정렬', opts:TXTALIGN_OPTS},
    {k:'nickFont',t:'select', label:'닉네임 폰트', opts:FONT_OPTS},

    {k:'nickGlow',t:'range', label:'닉네임 발광 강도', min:0, max:100, step:1, unit:'%'}

function hexToRgba(hex, a){
  let h = hex.replace('#','');
  if (h.length === 3) h = h.split('').map(function(c){return c+c;}).join('');
  const n = parseInt(h, 16);
  const r = (n>>16)&255, g = (n>>8)&255, b = n&255;
  a = Math.max(0, Math.min(1, a));
  return 'rgba(' + r + ', ' + g + ', ' + b + ', ' + fmt(a) + ')';
}
function fmt(v){ return Number((+v).toFixed(2)); }
function dirOffset(dir, dist){
  if (dir === 'down')  return 'translateY(-' + dist + 'px)';
  if (dir === 'left')  return 'translateX(-' + dist + 'px)';
  if (dir === 'right') return 'translateX(' + dist + 'px)';
  return 'translateY(' + dist + 'px)';   /* up: 아래에서 위로 */
}

    animParts.push('chat-in ' + fmt(S.animT) + 's ' + S.animEase);
  } else if (S.animType === 'slide'){
    entryKf = `/* 슬라이드: 지정 방향에서 미끄러져 등장 (이전 채팅은 즉시 이동) */
@keyframes chat-in {
  0%   { opacity: ${o}; transform: ${dirOffset(S.animDir, dist)} translateZ(0); }
  100% { opacity: 1;    transform: translateZ(0); }
}`;
    animParts.push('chat-in ' + fmt(S.animT) + 's ' + S.animEase);
  } else if (S.animType === 'pop'){
    entryKf = `/* 팝 바운스: 통통 튀며 등장 (통통 스타일 재구성) */
@keyframes chat-in {
  0%   { opacity: ${o}; transform: translateY(${dist}px) scale(0.95) translateZ(0); }
  60%  { opacity: 1;    transform: translateY(-${Math.round(dist*0.5)}px) scale(1.08) translateZ(0); }
  80%  { transform: translateY(${Math.round(dist*0.15)}px) scale(0.98) translateZ(0); }
  100% { transform: translateY(0) scale(1) translateZ(0); }
}`;
    animParts.push('chat-in ' + fmt(S.animT) + 's ' + S.animEase);
  } else if (S.animType === 'fade'){
    entryKf = `/* 페이드: 제자리에서 서서히 나타남 */
@keyframes chat-in {
  0%   { opacity: ${o}; }
  100% { opacity: 1; }
}`;
    animParts.push('chat-in ' + fmt(S.animT) + 's ' + S.animEase);
  }
  if (S.fadeOutOn){
    animParts.push('chat-fadeout 1s linear ' + S.fadeOutT + 's forwards');
  }
  const animLine = animParts.length ? '\n  animation: ' + animParts.join(', ') + ';' : '';
  const fadeoutKf = S.fadeOutOn ? `
/* 자동 사라짐 : ${S.fadeOutT}초 뒤 서서히 투명해짐 */
@keyframes chat-fadeout {
  to { opacity: 0; }
}` : '';

  return `/* ================================================================
   치지직 채팅 오버레이 · 레트로 신스웨이브 테마 v2
   (커스터마이저에서 생성됨 — OBS 브라우저 소스 → 사용자 지정 CSS에 붙여넣기)
   닉네임 표시: ${nm === 'stack' ? '2단' : nm === 'inline' ? '한 줄' : nm === 'badge' ? '플로팅 배지' : '숨김'} · 텍스트 정렬: ${S.txtAlign} · 화면 정렬: ${S.chAlign}
   ================================================================ */

/* ---------- [0] 웹폰트 ---------- */
${FONT_IMPORTS}

/* ---------- [1] 색상 팔레트 (RGBA) ---------- */
:root {
  --neon-sky:   ${cy(1)};
  --neon-hotpink: ${pk(1)};
  --night-bg-1: ${bg1};
  --night-bg-2: ${bg2};
  --msg-color:  ${msgCol};
  --nick-color: ${nickCol};
}

/* ---------- [2] 기본 리셋 ---------- */
img, svg { vertical-align: middle; }

body {
  font-family: ${FONT_STACK[S.msgFont]};
  font-weight: 400;
  background-color: rgba(0, 0, 0, 0);
  margin: 0 auto;
  overflow: hidden;
  perspective: ${S.persp}px;
  perspective-origin: 50% 100%;
}

/* ---------- [3] 채팅 전체 컨테이너 ---------- */
/* 치지직은 최신 채팅을 DOM 맨 앞에 넣으므로 column-reverse로
   "첫 요소 = 화면 맨 아래"가 되게 합니다. (최신이 아래, 이전이 위로 밀림)
   align-items가 채팅창 화면 정렬입니다.  */
[class*=_chatting_] {
  height: 100vh;
  display: flex;
  flex-direction: column-reverse;
  justify-content: flex-start;
  align-items: ${S.chAlign};
  padding: 48px ${S.padX}px 12px ${S.padX}px;
  box-sizing: border-box;
  transform: rotateX(${fmt(S.tilt)}deg) translateZ(0);
  transform-origin: 50% 100%;
  will-change: transform;
  -webkit-mask-image: linear-gradient(to bottom,
      rgba(0, 0, 0, 0) 0%,
      rgba(0, 0, 0, 0.35) ${fadeMid}%,
      rgba(0, 0, 0, 1) ${S.fade}%);
  mask-image: linear-gradient(to bottom,
      rgba(0, 0, 0, 0) 0%,
      rgba(0, 0, 0, 0.35) ${fadeMid}%,
      rgba(0, 0, 0, 1) ${S.fade}%);
}

/* ---------- [4] 채팅 말풍선 ---------- */
[class*=_item_] {
  position: relative;
  width: fit-content;
  max-width: ${S.maxW}%;
  border: ${fmt(S.borderW)}px solid ${cy(S.borderA/100)};
  border-radius: ${S.radius}px;
  margin-bottom: ${S.gap}px;
  background:
    ${layers.join(',\n    ')};
  backdrop-filter: blur(${S.blur}px);
  -webkit-backdrop-filter: blur(${S.blur}px);
  box-shadow:
    0 0 ${S.glowSize}px ${cy(S.glowA/100)},
    0 0 ${Math.round(S.glowSize*2.6)}px ${pk(S.bloomA/100)},
    inset 0 0 14px ${cy(fmt(S.glowA*0.002))};
  transform: translateZ(0);
  will-change: transform, opacity;
  backface-visibility: hidden;${animLine}
}

/* 치지직이 고정 높이를 걸어도 본문이 잘리지 않게 강제 (지우지 마세요) */
[class*=_item_] {
  height: auto !important;
}
[class*=_item_] > [class*=_container_],
[class*=_item_] > [class*=_container_] > [class*=_wrapper_] {
  height: auto !important;
  max-height: none !important;
  overflow: visible !important;
}

${entryKf}${fadeoutKf}

/* ---------- [5] 말풍선 내부 공통 ---------- */
[class*=_item_] > [class*=_container_] > [class*=_wrapper_] {
  font-size: ${S.msgSize}px !important;
  line-height: ${fmt(S.lineH)} !important;
  letter-spacing: 0px !important;
  padding: ${wrapPad} !important;
  text-align: ${S.txtAlign};
}

[class*=_wrapper_] > [class*=_container_] > [class*=_wrapper_] {
  vertical-align: middle;
  position: relative;
  top: 0px;
}

${headerCSS}
${sepCSS}
${nickSelector} {
  font-family: ${FONT_STACK[S.nickFont]};
  font-size: ${S.nickSize}px;
  font-weight: normal !important;
${nickColorLines}  letter-spacing: 0.5px;
  filter: drop-shadow(0 0 6px ${pk(S.nickGlow/100)});
}

/* ---------- [7] 뱃지 아이콘 ---------- */
[class*=_icon_] img {
  width: ${S.badgeSize}px;
  height: ${S.badgeSize}px;
  position: relative;
  filter: drop-shadow(0 0 4px ${cy(0.5)});
}
[class*=_icon_] {
  vertical-align: top;
  width: auto !important;
  height: auto !important;
}
[class*=_icon_] > [class*=_container_] { display: ${iconDisp}; }

/* ---------- [8] 메시지 본문 ---------- */
[class*=_wrapper_] > [class*=_text_] {
  display: ${txtDisp} !important;
  opacity: 1 !important;
  visibility: visible !important;
  padding: ${txtPad} !important;
  font-family: ${FONT_STACK[S.msgFont]};
  color: var(--msg-color) !important;
  vertical-align: baseline;
  text-shadow:
    0 0 6px ${cy(fmt(S.msgGlow/100))},
    0 0 16px ${cy(fmt(S.msgGlow/100*0.4))};
}

/* (안전망) 구조가 달라도 본문이 어두워지거나 숨지 않게 보장 */
[class*=_item_] [class*=_text_] {
  color: var(--msg-color) !important;
  opacity: 1 !important;
  visibility: visible !important;
}

${nickTextSafety}

/* 이모티콘 크기 */
[class*=_item_] [class*=_text_] img {
  width: ${S.emoteSize}px !important;
  height: ${S.emoteSize}px !important;
  position: relative;
  top: 0px;
}

/* ---------- [9] 강조(하이라이트) 메시지 ---------- */
[class*=_has_highlight_] { margin: 0; padding: 0; }

[class*=_has_highlight_] [class*=_text_] {
  margin: -2px !important;
  padding: 2px 6px !important;
  border-radius: 6px;
  background: ${pk(0.14)} !important;
  box-shadow: inset 0 0 0 1px ${pk(0.35)};
  filter: drop-shadow(0 0 6px ${pk(0.45)}) !important;
}

/* ---------- [10] 그라디언트 닉네임 예외 처리 ---------- */
[class*=_has_gradient_] [class*=_nickname_] {
  filter: drop-shadow(0 0 6px ${pk(0.5)});
}
[class*=_has_gradient_] [class*=_nickname_] [class*=_text_] {
  filter: none !important;
}
`;
}

/* =========================================================
   4-B) 위플랩용 CSS 생성
========================================================= */
function buildWeflabCSS(){
  const S = SW;
  const ne = function(a){ return hexToRgba(S.wfNeon, a * S.wfNeonAlp/100); };
  const pk = function(a){ return hexToRgba(S.wfNeon2, a * S.wfNeon2Alp/100); };
  const st = function(a){ return hexToRgba(S.wfStNeon, a * S.wfStNeonAlp/100); };
  const bg1 = hexToRgba(S.wfBg, S.wfBgA/100);
  const bg2 = hexToRgba(S.wfBg2, S.wfBg2A/100);
  const stBg = hexToRgba(S.wfStBg, S.wfStBgA/100);
  const msgCol  = hexToRgba(S.wfMsgC, S.wfMsgCAlp/100);
  const nickCol = hexToRgba(S.wfNickC, S.wfNickCAlp/100);
  const stNick  = hexToRgba(S.wfStNickC, S.wfStNickCAlp/100);
  const stMsg   = hexToRgba(S.wfStMsgC, S.wfStMsgCAlp/100);

  const maskBlock = S.wfMask ? `/* ---------- [2] 채팅 영역 상단 페이드 (위플랩 공통) ---------- */
.chat_area {
    ;-webkit-mask-image: -webkit-gradient(linear, left bottom, left top, from(rgba(0,0,0,1)), color-stop(${fmt(S.wfMaskStop/100)}, rgba(0,0,0,1)), to(rgba(0,0,0,0)))!important
}
` : `/* ---------- [2] 상단 페이드 마스크: 사용 안 함 ---------- */
`;

  /* 3D 기울기 (0이면 미포함) */
  const tiltBlock = (S.wfTilt > 0) ? `/* ---------- [2.5] 3D 기울기·원근 ---------- */
body {
    ;perspective: ${S.wfPersp}px
    ;perspective-origin: 50% 100%
}
.chat_area {
    ;transform: rotateX(${fmt(S.wfTilt)}deg)
    ;transform-origin: 50% 100%
    ;will-change: transform
}
` : '';

  /* 아이콘 표시/숨김 */
  const iconBlock = S.wfIconShow ? '' : `/* 플랫폼·뱃지 아이콘 숨김 */
.icon_platform, .icon_badge {
    ;display: none!important
}
`;

  /* 배경 질감 레이어 */
  const wlayers = [];
  if (S.wfGloss) wlayers.push('linear-gradient(180deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0) 34%)');
  if (S.wfScan)  wlayers.push('repeating-linear-gradient(0deg, rgba(255,255,255,0.035) 0px, rgba(255,255,255,0.035) 1px, rgba(0,0,0,0) 1px, rgba(0,0,0,0) 3px)');
  wlayers.push('linear-gradient(165deg, var(--배경-색상-위) 0%, var(--배경-색상-아래) 100%)');

  /* 등장 애니메이션 분기 */
  const o = fmt(S.wfAnimOpa/100);
  let animLine, staticMargin = '', customKf = '';
  if (S.wfAnim === 'weflab'){
    animLine = ';animation: pda 600ms cubic-bezier(0, 0.76, 0.15, 1) forwards, rise 340ms cubic-bezier(0.11, 0.9, 0.21, 1) forwards, fd 240ms cubic-bezier(0.23, 0.01, 0.35, 0.68) forwards, ririse 520ms cubic-bezier(0.28, 1.3, 0, 0.96) forwards, var(--페이드-아웃) 1s linear var(--페이드-아웃-시간) forwards!important';
  } else if (S.wfAnim === 'poing'){
    animLine = ';animation: popSlide ' + fmt(S.wfAnimT) + 's cubic-bezier(0.2, 1.6, 0.4, 1) both, var(--페이드-아웃) 1s linear var(--페이드-아웃-시간) forwards!important';
    staticMargin = '\n    ;margin: var(--채팅-간격) 0em 0.2em 0em!important';
  } else if (S.wfAnim === 'slide'){
    customKf = `@keyframes wf-custom-in {
    0% { opacity: ${o}; transform: ${dirOffset(S.wfAnimDir, S.wfAnimDist)} }
    100% { opacity: 1; transform: translateY(0) }
}
`;
    animLine = ';animation: wf-custom-in ' + fmt(S.wfAnimT) + 's ' + S.wfAnimEase + ' both, var(--페이드-아웃) 1s linear var(--페이드-아웃-시간) forwards!important';
    staticMargin = '\n    ;margin: var(--채팅-간격) 0em 0.2em 0em!important';
  } else if (S.wfAnim === 'fade'){
    customKf = `@keyframes wf-custom-in {
    0% { opacity: ${o} }
    100% { opacity: 1 }
}
`;
    animLine = ';animation: wf-custom-in ' + fmt(S.wfAnimT) + 's ' + S.wfAnimEase + ' both, var(--페이드-아웃) 1s linear var(--페이드-아웃-시간) forwards!important';
    staticMargin = '\n    ;margin: var(--채팅-간격) 0em 0.2em 0em!important';
  } else {
    animLine = ';animation: var(--페이드-아웃) 1s linear var(--페이드-아웃-시간) forwards!important';
    staticMargin = '\n    ;margin: var(--채팅-간격) 0em 0.2em 0em!important';
  }

  /* 닉네임 스타일 분기 */
  const nickStyleCSS = (S.wfNickStyle === 'badge') ? `
/* 닉네임 플로팅 배지 */
.chat_list div.chat .name {
    ;position: absolute!important
    ;top: ${S.wfNickTop}px
    ;left: 10px
    ;height: 0px
}
.chat_list div.chat .nick {
    ;background: ${hexToRgba(S.wfNickBoxBg, S.wfNickBoxA/100)}
    ;border-radius: ${S.wfNickBoxR}px
    ;padding: 2px 12px
    ;border: 1px solid ${ne(0.45)}
    ;box-shadow: 0 0 8px ${hexToRgba(S.wfNickBoxBg, 0.45)}
}
` : '';

  /* 닉네임 ':' 구분기호 */
  const sepCSS = S.wfNickSep ? `
/* 닉네임 뒤 ':' 구분기호 */
.chat_list div.chat .nick::after {
    content: ":";
}
` : '';

  /* 닉네임 색 강제 통일 여부 */
  const nickColorName = S.wfNickForce ? '\n    ;color: var(--닉네임-색상)!important' : '';
  const nickColorNick = S.wfNickForce ? '\n    ;color: var(--닉네임-색상)!important' : '';
  const stNickColor   = S.wfNickForce ? `
.chat_list div.chat.streamer .nick {
    ;color: var(--스트리머-닉네임-색상)!important
}` : `
/* 닉네임 색 강제 통일 꺼짐: 스트리머 닉네임도 플랫폼 지정색 유지 */`;

  return `/* ================================================================
   위플랩(weflab) 채팅 위젯 · 레트로 신스웨이브 커스텀 v2
   (커스터마이저에서 생성됨 — 위플랩 위젯 설정의 커스텀 CSS에 붙여넣기)
   ================================================================ */

/* ---------- [0] 웹폰트 ---------- */
${FONT_IMPORTS}

/* ---------- [1] 위플랩 표준 :root 변수 (RGBA) ---------- */
:root {
    ;--폰트-사이즈: ${S.wfFontSize}px
    ;--닉네임-사이즈: ${S.wfNickSize}px
    ;--폰트-이름: ${FONT_STACK[S.wfFont]}
    ;--닉네임-폰트: ${FONT_STACK[S.wfNickFont]}
    ;--닉네임-표시: ${S.wfNickShow ? 'flex' : 'none'}    /* flex: 표시, none: 숨기기 */

    ;--닉네임-색상: ${nickCol}
    ;--메시지-색상: ${msgCol}
    ;--배경-색상-위: ${bg1}
    ;--배경-색상-아래: ${bg2}
    ;--네온-색상: ${ne(1)}

    ;--스트리머-닉네임-색상: ${stNick}
    ;--스트리머-메시지-색상: ${stMsg}
    ;--스트리머-배경-색상: ${stBg}

    ;--모서리-둥글기: ${fmt(S.wfRadius)}em
    ;--채팅-간격: ${S.wfGap}px
    ;--채팅창-정렬: ${S.wfAlign}    /* start: 왼쪽, center: 중앙, end: 오른쪽 */

    ;--페이드-아웃: ${S.wfFadeOn ? 'fade-on' : 'fade-off'}    /* fade-on: 활성, fade-off: 비활성 */
    ;--페이드-아웃-시간: ${S.wfFadeT}s
}

${maskBlock}${tiltBlock}${iconBlock}
/* ---------- [3] 리스트 골격 (init) ---------- */
.chat_list {
    ;display: grid!important
    ;grid-template-columns: 1fr!important
    ;align-items: var(--채팅창-정렬)!important
    ;justify-items: var(--채팅창-정렬)!important
}
.chat_list > div {
    ;margin: unset
}
.chat_list div.chat,
.chat_list div.chat .inner_box {
    ;width: fit-content!important
    ;position: relative!important
}
.chat_list div.chat {
    ;max-width: ${S.wfMaxW}%!important
}

/* ---------- [4] 말풍선 (신스웨이브 네온) ---------- */
.chat_list .inner_box {
    ;font-size: var(--폰트-사이즈)!important
    ;line-height: ${fmt(S.wfLineH)}em!important
    ;font-family: var(--폰트-이름)!important
}
.chat_list div.chat {
    ;background: ${wlayers.join(', ')}!important
    ;border: ${fmt(S.wfBorderW)}px solid ${ne(S.wfBorderA/100)}!important
    ;box-shadow: 0 0 ${S.wfGlowSize}px ${ne(S.wfNeonA/100)}, 0 0 ${Math.round(S.wfGlowSize*2.4)}px ${pk(S.wfBloomA/100)}, inset 0 0 12px ${ne(0.07)}!important
    ;backdrop-filter: blur(${S.wfBlur}px)
    ;-webkit-backdrop-filter: blur(${S.wfBlur}px)
    ;padding: ${fmt(S.wfPadY)}em ${fmt(S.wfPadXIn)}em
    ;border-radius: var(--모서리-둥글기)
    ;font-size: var(--폰트-사이즈)!important
    ;line-height: ${fmt(S.wfLineH)}em!important${staticMargin}
    ${animLine}
}
${nickStyleCSS}${sepCSS}
/* ---------- [5] 닉네임 / 본문 ---------- */
.chat_list div.chat .name {
    ;display: var(--닉네임-표시)!important
    ;font-size: var(--닉네임-사이즈)!important
    ;font-family: var(--닉네임-폰트)!important
    ;line-height: ${fmt(S.wfLineH)}em!important
    ;text-shadow: none!important
    ;font-weight: normal!important${nickColorName}
    ;filter: drop-shadow(0 0 6px ${pk(S.wfNickGlow/100)})
}
.chat_list div.chat .name :not(.nick) {
    margin-bottom: 0.1em
}
.chat_list div.chat .nick {
    ;font-size: var(--닉네임-사이즈)!important
    ;font-family: var(--닉네임-폰트)!important

    ;font-weight: normal!important
}
.chat_list div.chat .text {

    ;font-family: var(--폰트-이름)!important
    ;color: var(--메시지-색상)!important
    ;line-height: ${fmt(S.wfLineH)}em!important
    ;font-weight: 400!important
    ;text-align: ${S.wfTxtAlign}!important
    ;text-shadow: 0 0 6px ${ne(fmt(S.wfTextGlow/100))}, 0 0 16px ${ne(fmt(S.wfTextGlow/100*0.4))}!important
}
.chat_list div.chat .text span {
    ;margin: -0.1em 0.06em
    ;border-radius: 0.2em
}
.chat_list div.chat .text img {

    ;height: ${S.wfEmoteSize}px!important
    ;vertical-align: middle
}

/* ---------- [6] 스트리머 메시지 ---------- */
.chat_list div.chat.streamer {
    ;background: var(--스트리머-배경-색상)!important
    ;border: ${fmt(S.wfBorderW)}px solid ${st(0.85)}!important
    ;box-shadow: 0 0 ${S.wfGlowSize}px ${st(S.wfStGlowA/100)}, 0 0 ${Math.round(S.wfGlowSize*2.4)}px ${st(fmt(S.wfStGlowA/100*0.45))}!important
}${stNickColor}
.chat_list div.chat.streamer .name {
    ;filter: drop-shadow(0 0 6px ${ne(0.5)})
}
.chat_list div.chat.streamer .text {

/* =========================================================
   5) 컨트롤 패널 렌더링
========================================================= */
function renderControls(mount, sections, state, defaults){
  const refs = {};
  mount.innerHTML = '';
  sections.forEach(function(sec){
    const d = document.createElement('details');
    d.className = 'sec';
    if (sec.open) d.open = true;
    const sum = document.createElement('summary');
    sum.textContent = sec.title;
    d.appendChild(sum);
    const body = document.createElement('div');
    body.className = 'sec-body';

    sec.items.forEach(function(it){
      const wrap = document.createElement('div');
      wrap.className = 'ctl';
      const lbl = document.createElement('div');
      lbl.className = 'lbl';
      lbl.innerHTML = '<span class="name">' + it.label + '</span>' +
                      (it.hint ? '<span class="hint">' + it.hint + '</span>' : '');
      wrap.appendChild(lbl);

      const row = document.createElement('div');
      row.className = 'row';

      if (it.t === 'range'){
        const r = document.createElement('input');
        r.type = 'range'; r.min = it.min; r.max = it.max; r.step = it.step; r.value = state[it.k];
        const n = document.createElement('input');
        n.type = 'number'; n.className = 'num'; n.min = it.min; n.max = it.max; n.step = it.step; n.value = state[it.k];
        const u = document.createElement('span'); u.className = 'unit'; u.textContent = it.unit;
        r.addEventListener('input', function(e){
          const v = parseFloat(e.target.value);
          state[it.k] = v; n.value = v; apply();
        });
        n.addEventListener('input', function(e){
          const v = parseFloat(e.target.value);
          if (!isNaN(v) && v >= it.min && v <= it.max){ state[it.k] = v; r.value = v; apply(); }
        });
        n.addEventListener('change', function(e){
          let v = parseFloat(e.target.value);
          if (isNaN(v)) v = state[it.k];
          v = Math.min(it.max, Math.max(it.min, v));
          state[it.k] = v; r.value = v; n.value = v; apply();
        });
        row.appendChild(r); row.appendChild(n); row.appendChild(u);
        refs[it.k] = [r, n];
      }
      else if (it.t === 'rgba'){
        /* RGBA 통합 컨트롤: 색상 + 불투명도(alpha) */
        const c = document.createElement('input');
        c.type = 'color'; c.value = state[it.k];
        const r = document.createElement('input');
        r.type = 'range'; r.min = 0; r.max = 100; r.step = 1; r.value = state[it.ak];
        r.title = '불투명도(알파)';
        const n = document.createElement('input');
        n.type = 'number'; n.className = 'num'; n.min = 0; n.max = 100; n.step = 1; n.value = state[it.ak];
        const u = document.createElement('span'); u.className = 'unit'; u.textContent = '%';
        c.addEventListener('input', function(e){ state[it.k] = e.target.value; apply(); });
        r.addEventListener('input', function(e){
          const v = parseFloat(e.target.value);
          state[it.ak] = v; n.value = v; apply();
        });
        n.addEventListener('input', function(e){
          const v = parseFloat(e.target.value);
          if (!isNaN(v) && v >= 0 && v <= 100){ state[it.ak] = v; r.value = v; apply(); }
        });
        n.addEventListener('change', function(e){
          let v = parseFloat(e.target.value);
          if (isNaN(v)) v = state[it.ak];
          v = Math.min(100, Math.max(0, v));
          state[it.ak] = v; r.value = v; n.value = v; apply();
        });
        row.appendChild(c); row.appendChild(r); row.appendChild(n); row.appendChild(u);
        refs[it.k] = [c];
        refs[it.ak] = [r, n];
      }
      else if (it.t === 'color'){
        const c = document.createElement('input');
        c.type = 'color'; c.value = state[it.k];
        const hx = document.createElement('span'); hx.className = 'hexlbl'; hx.textContent = state[it.k];
        c.addEventListener('input', function(e){
          state[it.k] = e.target.value; hx.textContent = e.target.value; apply();
        });
        row.appendChild(c); row.appendChild(hx);
        refs[it.k] = [c, hx];
      }
      else if (it.t === 'select'){
        const sel = document.createElement('select');
        it.opts.forEach(function(o){
          const op = document.createElement('option');
          op.value = o.v; op.textContent = o.label;
          sel.appendChild(op);
        });
        sel.value = state[it.k];
        sel.addEventListener('change', function(e){ state[it.k] = e.target.value; apply(); });
        row.appendChild(sel);
        refs[it.k] = [sel];
      }
      else if (it.t === 'toggle'){
        const lab = document.createElement('label'); lab.className = 'switch';
        const cb = document.createElement('input'); cb.type = 'checkbox'; cb.checked = state[it.k];
        const sl = document.createElement('span'); sl.className = 'slider-tg';
        lab.appendChild(cb); lab.appendChild(sl);
        const st = document.createElement('span');
        st.style.cssText = 'color:var(--sub);font-size:12px';
        st.textContent = state[it.k] ? '켜짐' : '꺼짐';
        cb.addEventListener('change', function(e){
          state[it.k] = e.target.checked; st.textContent = state[it.k] ? '켜짐' : '꺼짐'; apply();
        });
        row.appendChild(lab); row.appendChild(st);
        refs[it.k] = [cb, st];
      }
      wrap.appendChild(row);
      body.appendChild(wrap);
    });
    d.appendChild(body);
    mount.appendChild(d);
  });
  return refs;
}

function copyCSS(){
  const css = activeCSS();
  function done(ok){
    showToast(ok
      ? '✓ ' + fileName() + ' 내용 복사 완료 · ' + (mode === 'chzzk' ? 'OBS 사용자 지정 CSS에 붙여넣으세요' : 'OBS 사용자 지정 CSS에 붙여넣으세요')
      : '자동 복사가 차단됐어요 — 아래 CSS가 전체 선택돼 있으니 Ctrl+C (Mac: ⌘+C)를 눌러주세요');
  }
  if (navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(css).then(function(){ done(true); }, function(){ fallbackCopy(css, done); });
  } else {
    fallbackCopy(css, done);
  }
}
function fallbackCopy(css, done){
  try {
    const det = cssView.closest('details');
    if (det && !det.open) det.open = true;
    cssView.value = css;
    cssView.focus(); cssView.select();
    try { cssView.setSelectionRange(0, cssView.value.length); } catch(e){}
    const ok = document.execCommand('copy');
    if (!ok && det) det.scrollIntoView({behavior:'smooth', block:'nearest'});
    done(ok);
  } catch(e){ done(false); }
}

function downloadCSS(){
  const css = activeCSS();
  try {
    const blob = new Blob([css], {type:'text/css;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = fileName();
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(function(){ URL.revokeObjectURL(url); }, 1500);
    showToast('⬇ ' + fileName() + ' 다운로드를 시작했습니다');
  } catch(e){
    showToast('다운로드가 차단됐어요 — 복사 버튼이나 아래 CSS 칸을 이용해주세요');
  }
}

  document.getElementById('apply-note').innerHTML = (m === 'chzzk') ? NOTE_CH : NOTE_WF;
  document.getElementById('pv-foot').textContent  = (m === 'chzzk') ? FOOT_CH : FOOT_WF;
  if (fdoc && stageEl){ buildStage(); }
  apply();
  seedChats();
  showToast(m === 'chzzk' ? '치지직 모드 — chzzk-overlay.css 생성' : '위플랩 모드 — weflab-widget.css 생성');
}

/* =========================================================
   8) 시작
========================================================= */
document.getElementById('btn-copy').addEventListener('click', copyCSS);
document.getElementById('btn-download').addEventListener('click', downloadCSS);
document.getElementById('btn-reset').addEventListener('click', resetAll);
document.getElementById('btn-add').addEventListener('click', addChat);
document.getElementById('btn-auto').addEventListener('click', function(){ setAuto(!autoTimer); });
document.getElementById('bg-seg').addEventListener('click', function(e){
  if (e.target.dataset && e.target.dataset.bg) setBg(e.target.dataset.bg);
});
document.getElementById('mode-tabs').addEventListener('click', function(e){
  if (e.target.dataset && e.target.dataset.mode) setMode(e.target.dataset.mode);
});

refsC = renderControls(document.getElementById('sections-chzzk'), SECTIONS_C, SC, DEF_C);
refsW = renderControls(document.getElementById('sections-weflab'), SECTIONS_W, SW, DEF_W);
document.getElementById('apply-note').innerHTML = NOTE_CH;
document.getElementById('pv-foot').textContent = FOOT_CH;

initFrame();
apply();
seedChats();
setAuto(true);
</script>
</body>
